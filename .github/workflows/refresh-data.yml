name: Refresh data

on:
  schedule:
    # Daily at 09:00 UTC (02:00 PT, 04:00 CT, 05:00 ET)
    - cron: '0 9 * * *'
  workflow_dispatch:           # Allow manual trigger from Actions tab
    inputs:
      mode:
        description: 'Refresh mode'
        type: choice
        default: pr
        options:
          - pr               # Open a PR with the changes (recommended)
          - direct           # Commit directly to main (faster, less safe)

permissions:
  contents: write
  pull-requests: write

env:
  # Opt into Node.js 24 for actions — Node 20 deprecates Sept 16, 2026.
  # Per https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run refresh script
        env:
          GITHUB_TOKEN:      ${{ secrets.GH_DATA_TOKEN }}
          YOUTUBE_API_KEY:   ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL:      claude-haiku-4-5
        run: bun run scripts/refresh-data.ts

      - name: Verify build still passes
        run: bun run tsc --noEmit && bun run build

      - name: Commit + open PR (PR mode)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'pr' || github.event.inputs.mode == '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: data refresh ${{ github.run_id }}"
          title: "🤖 Daily data refresh"
          body: |
            Automated daily data refresh from `refresh-data.ts`.

            **Sources pulled:**
            - GitHub repo stats (stars, forks, PRs, contributors)
            - arXiv recent Physical AI papers
            - YouTube tracked-channel videos
            - Reddit + HackerNews hot-topic signals
            - Claude-synthesized hot topic narratives (if `ANTHROPIC_API_KEY` set)

            **Files updated:** `src/data/auto/*.json`

            ---
            Triggered by scheduled cron · review the diff and merge if everything looks correct.
          branch: data-refresh/${{ github.run_id }}
          delete-branch: true
          add-paths: |
            src/data/auto/

      - name: Commit directly (direct mode)
        if: ${{ github.event.inputs.mode == 'direct' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/auto/
          git diff --quiet --cached || (git commit -m "chore: data refresh ${{ github.run_id }} [direct]" && git push)
