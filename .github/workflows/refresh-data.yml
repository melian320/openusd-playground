name: Refresh data

on:
  schedule:
    # Daily at ~07:30 UTC.
    - cron: '30 7 * * *'
  workflow_dispatch:           # Allow manual trigger from Actions tab
    inputs:
      mode:
        description: 'Refresh mode'
        type: choice
        default: direct
        options:
          - direct           # Commit directly to main and let Netlify auto-deploy
          - pr               # Open a review PR instead

concurrency:
  group: physical-ai-data-refresh
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  # Opt into Node.js 24 for actions — Node 20 deprecates Sept 16, 2026.
  # Per https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_PAT }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run refresh script
        env:
          GITHUB_PAT:        ${{ secrets.GITHUB_PAT }}
          YOUTUBE_API_KEY:   ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL:      claude-haiku-4-5
        run: bun run refresh-data

      - name: Verify build still passes
        run: bun run build

      - name: Commit directly (scheduled/default mode)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'direct' || github.event.inputs.mode == '' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/auto/
          git diff --quiet --cached || (git commit -m "chore: data refresh ${{ github.run_id }} [direct]" && git push)

      - name: Commit + open PR (review mode)
        if: ${{ github.event.inputs.mode == 'pr' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_PAT }}
          commit-message: "chore: data refresh ${{ github.run_id }}"
          title: "🤖 Daily data refresh"
          body: |
            Automated daily data refresh from `refresh-data.ts`.

            **Sources pulled:**
            - GitHub repo stats (stars, forks, PRs, contributors)
            - arXiv recent Physical AI papers
            - YouTube tracked-channel videos
            - Hacker News hot-topic signals
            - Public RSS/Atom feeds for ROS, NVIDIA robotics, OpenUSD, and adjacent ecosystem updates
            - GitHub/arXiv/YouTube/RSS/HN blended hot-topic signal pool
            - Claude-synthesized hot topic narratives and action analysis (if `ANTHROPIC_API_KEY` set)

            **Files updated:** `src/data/auto/*.json`, including `hot-topic-analysis.json`

            ---
            Triggered manually in PR mode for review before merge.
          branch: data-refresh/${{ github.run_id }}
          delete-branch: true
          add-paths: |
            src/data/auto/
